# This workflow publishes the Pi lifecycle telemetry extension as a GitHub
# Packages npm package. The package root is src/plugins/pi, while the GitHub
# package name intentionally follows the repository path: @zeeq-ai/zeeq-app.
#
# Versioning and publishing are driven by semantic-release
# (https://semantic-release.gitbook.io), scoped to this one package via
# semantic-release-monorepo (https://github.com/pmowrer/semantic-release-monorepo):
#
#   1. semantic-release-monorepo filters the commit history down to only
#      commits that touched src/plugins/pi (relative to the last
#      @zeeq-ai/zeeq-app-pi-telemetry@<version> tag) before analyzing them —
#      an unrelated feat/fix commit elsewhere in the repo never triggers a
#      release here, and this workflow's own `paths` filter below means it
#      never even runs for those commits.
#   2. The next version is inferred entirely from conventional-commit
#      prefixes on those filtered commits (feat -> minor, fix -> patch,
#      BREAKING CHANGE/! -> major) — there is no `yarn changeset` step and no
#      per-PR changeset file to author.
#   3. On a release, semantic-release publishes to GitHub Packages and pushes
#      a `@zeeq-ai/zeeq-app-pi-telemetry@<version>` git tag plus a GitHub
#      Release with generated notes. It does NOT commit or open a PR: the
#      version bump written into package.json happens only in this job's
#      ephemeral checkout, immediately before `npm publish`, and is never
#      pushed back to a branch. The tag and the registry are the source of
#      truth for what's actually published — the version checked into
#      src/plugins/pi/package.json is a static placeholder.
#
# This repo has only one publishable package under src/plugins/** today. A
# future second package would get its own .releaserc.json (own tagFormat) and
# its own `paths` filter/job here.

name: Publish Pi Package

on:
  # semantic-release is self-gating (a run with no releasable commits since
  # the last tag is a no-op), but the paths filter avoids even starting the
  # job for pushes that never touched this package.
  push:
    branches:
      - main
    paths:
      - "src/plugins/pi/**"

  # Allow maintainers to re-run after a registry or workflow failure.
  workflow_dispatch:

concurrency:
  group: publish-pi-package
  cancel-in-progress: false

permissions:
  # checkout needs read access to the repository contents.
  contents: read

jobs:
  release:
    name: Release src/plugins/pi
    runs-on: ubuntu-latest
    permissions:
      # semantic-release pushes the release tag and creates the GitHub
      # Release. No pull-requests permission is needed -- this workflow never
      # opens a PR.
      contents: write
      # npm publish uses GITHUB_TOKEN to write to GitHub Packages.
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Configure npm for GitHub Packages. setup-node writes the auth-aware
      # .npmrc that @semantic-release/npm's `npm publish` uses with
      # NODE_AUTH_TOKEN below.
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@zeeq-ai"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Release
        working-directory: src/plugins/pi
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
