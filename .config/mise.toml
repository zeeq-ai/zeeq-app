[tools]
dotnet = "10.0.201"
cloud-sql-proxy = "latest"
"dotnet:CSharpRepl" = "0.9.2"
node = "26"
aspire = "13.4.6"

[env]
CLOUDSDK_CONFIG = "{{config_root}}/.config/.gcloud-config"
OPENCODE_CONFIG = "{{config_root}}/.config/opencode.json"
GCP_PROJECT_ID = "zeeq-ai-prod"
GCP_REGION = "us-central1"
GCP_ZONE = "us-central1-a"
GCP_ARTIFACT_REPOSITORY = "zeeq"
GCP_RUNTIME_SA = "zeeq-app-svc@zeeq-ai-prod.iam.gserviceaccount.com"
GCP_RELEASE_DEPLOYER_NAME = "github-release-deployer"
GCP_WORKLOAD_IDENTITY_POOL_ID = "github"
GCP_WORKLOAD_IDENTITY_PROVIDER_ID = "zeeq-app"
ZEEQ_GITHUB_REPO = "zeeq-ai/zeeq-app"
GH_RELEASE_ENVIRONMENT = "production"
ZEEQ_OTEL_COLLECTOR_VM_NAME = "zeeq-otel-collector"
ZEEQ_OTEL_COLLECTOR_MACHINE_TYPE = "e2-small"
ZEEQ_OTEL_COLLECTOR_IMAGE_NAME = "zeeq-otel-collector"
ZEEQ_OTEL_COLLECTOR_DOMAIN = "otel.zeeq.ai"
ZEEQ_OTEL_COLLECTOR_ISSUER_URL = "https://app.zeeq.ai/"
ZEEQ_OTEL_COLLECTOR_OTLP_HTTP_ENDPOINT = "https://app.zeeq.ai"
ZEEQ_OTEL_COLLECTOR_TELEMETRY_AUDIENCE = "https://app.zeeq.ai/mcp"
CSQL_PROXY_INSTANCE_CONNECTION_NAME = "zeeq-ai-prod:us-central1:zeeq-pg-prod"
PUBSUB_PROJECT_ID = "zeeq-dev-local"
